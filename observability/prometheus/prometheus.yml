global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    env: dev
    project: zdt-migration

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Kafka Connect exposes JMX — scraping via jmx_exporter would go here once
  # we mount a config. Out of scope for the first pass; chaos overlay still
  # works without these two.
  # - job_name: connect
  #   static_configs: [{ targets: ["connect:5556"] }]

  # Week 2+ — our own Go services expose /metrics.
  - job_name: transformer
    static_configs:
      - targets: ["transformer:8080"]
    metrics_path: /metrics
    honor_labels: true

  - job_name: sink
    static_configs:
      - targets: ["sink:8080"]
    metrics_path: /metrics
    honor_labels: true
