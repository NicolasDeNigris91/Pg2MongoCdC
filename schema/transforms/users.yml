# SQL -> Mongo mapping. Loaded at transformer startup; one file per table.

ruleSchemaVersion: 1
source: public.users
target: users
schemaVersion: 1
idStrategy: pk            # _id = "users:{id}"

fields:
  id:         { type: bigint,      target: _pkId }
  email:      { type: string,      target: email, index: { kind: unique } }
  full_name:  { type: string,      target: fullName }
  profile:    { type: jsonb,       target: profile, embed: true }
  is_active:  { type: boolean,     target: isActive, default: true }
  created_at: { type: timestamptz, target: createdAt, format: iso8601, index: true }
  updated_at: { type: timestamptz, target: updatedAt, format: iso8601 }

# No joins for users - orders/order_items are linked via user_id on their side.
