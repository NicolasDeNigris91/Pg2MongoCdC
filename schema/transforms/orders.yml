ruleSchemaVersion: 1
source: public.orders
target: orders
schemaVersion: 1
idStrategy: pk

fields:
  id:          { type: bigint,      target: _pkId }
  user_id:     { type: bigint,      target: userId, index: true }
  status:      { type: string,      target: status, index: true,
                 enum: [pending, paid, shipped, cancelled] }
  total_cents: { type: bigint,      target: totalCents }
  created_at:  { type: timestamptz, target: createdAt, format: iso8601, index: true }
  updated_at:  { type: timestamptz, target: updatedAt, format: iso8601 }

# Embed line items as a nested array. Transformer joins at consume-time using
# a Kafka-compacted lookup on cdc.order_items keyed by order_id.
joins:
  - kind: embed
    source: public.order_items
    on: order_items.order_id = orders.id
    target: items
    fields:
      id:          { type: bigint, target: _pkId }
      sku:         { type: string, target: sku }
      qty:         { type: int,    target: qty }
      price_cents: { type: bigint, target: priceCents }
