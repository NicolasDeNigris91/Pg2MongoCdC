{{- if .Values.transformer.enabled -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pg2mongo-cdc.fullname" . }}-transformer
  labels:
    {{- include "pg2mongo-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: transformer
spec:
  {{- if not .Values.transformer.hpa.enabled }}
  replicas: {{ .Values.transformer.replicaCount }}
  {{- end }}
  # RollingUpdate with maxUnavailable=0 so the consumer group stays balanced
  # during a rollout - never have fewer instances than the desired count.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "pg2mongo-cdc.selectorLabels" (list . "transformer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pg2mongo-cdc.selectorLabels" (list . "transformer") | nindent 8 }}
        {{- with .Values.transformer.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.transformer.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pg2mongo-cdc.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: transformer
          image: "{{ .Values.image.registry }}/{{ .Values.image.transformerRepository }}:{{ include "pg2mongo-cdc.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http-metrics
              containerPort: 8080
              protocol: TCP
          env:
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: KAFKA_GROUP_ID
              value: {{ .Values.transformer.groupId | quote }}
            - name: KAFKA_TOPIC_REGEX
              value: {{ .Values.transformer.topicRegex | quote }}
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.credentialsSecret }}
                  key: username
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.credentialsSecret }}
                  key: password
            - name: RULES_DIR
              value: /etc/transformer/rules
            - name: METRICS_ADDR
              value: ":8080"
          volumeMounts:
            - name: rules
              mountPath: /etc/transformer/rules
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Readiness is intentionally a deeper check than liveness - see
          # docs/slo.md for why "container alive" is not the same as "events
          # flowing". Production should layer a custom readiness check
          # (e.g. consumer-group-lag-bounded) on top of /healthz.
          readinessProbe:
            httpGet:
              path: /healthz
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.transformer.resources | nindent 12 }}
      volumes:
        - name: rules
          configMap:
            name: {{ .Values.transformer.rulesConfigMap }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.transformer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.transformer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.transformer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Default pod anti-affinity: prefer to spread transformer pods across
      # nodes so a single node failure does not knock out the entire
      # consumer group at once.
      {{- if not .Values.transformer.affinity }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "pg2mongo-cdc.selectorLabels" (list . "transformer") | nindent 20 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pg2mongo-cdc.fullname" . }}-transformer
  labels:
    {{- include "pg2mongo-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: transformer
spec:
  type: ClusterIP
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-metrics
      protocol: TCP
  selector:
    {{- include "pg2mongo-cdc.selectorLabels" (list . "transformer") | nindent 4 }}
{{- if .Values.transformer.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "pg2mongo-cdc.fullname" . }}-transformer
  labels:
    {{- include "pg2mongo-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: transformer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "pg2mongo-cdc.fullname" . }}-transformer
  minReplicas: {{ .Values.transformer.hpa.minReplicas }}
  maxReplicas: {{ .Values.transformer.hpa.maxReplicas }}
  metrics:
    {{- toYaml .Values.transformer.hpa.metrics | nindent 4 }}
  behavior:
    # Scale up fast, scale down slowly. Consumer group rebalances on
    # scale-down cause brief lag spikes; doing them rarely is preferable.
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
{{- end }}
{{- end }}
