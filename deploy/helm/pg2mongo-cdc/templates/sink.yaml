{{- if .Values.sink.enabled -}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pg2mongo-cdc.fullname" . }}-sink
  labels:
    {{- include "pg2mongo-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: sink
spec:
  {{- if not .Values.sink.hpa.enabled }}
  replicas: {{ .Values.sink.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "pg2mongo-cdc.selectorLabels" (list . "sink") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pg2mongo-cdc.selectorLabels" (list . "sink") | nindent 8 }}
        {{- with .Values.sink.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.sink.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "pg2mongo-cdc.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sink
          image: "{{ .Values.image.registry }}/{{ .Values.image.sinkRepository }}:{{ include "pg2mongo-cdc.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http-metrics
              containerPort: 8080
              protocol: TCP
          env:
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: KAFKA_GROUP_ID
              value: {{ .Values.sink.groupId | quote }}
            - name: KAFKA_TOPIC_REGEX
              value: {{ .Values.sink.topicRegex | quote }}
            - name: KAFKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.credentialsSecret }}
                  key: username
            - name: KAFKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.credentialsSecret }}
                  key: password
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongo.uriSecret }}
                  key: uri
            - name: MONGO_DB
              value: {{ .Values.mongo.database | quote }}
            - name: SCHEMA_VERSION
              value: {{ .Values.mongo.schemaVersion | quote }}
            - name: METRICS_ADDR
              value: ":8080"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http-metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.sink.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.sink.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.sink.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.sink.affinity }}
      affinity:
        {{- toYaml .Values.sink.affinity | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "pg2mongo-cdc.selectorLabels" (list . "sink") | nindent 20 }}
      {{- end }}
      # Sink commits offsets only after successful Mongo BulkWrite (ADR-003).
      # On graceful shutdown we want any in-flight batch to drain before
      # the kubelet sends SIGKILL; 30s is enough for a worst-case batch.
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pg2mongo-cdc.fullname" . }}-sink
  labels:
    {{- include "pg2mongo-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: sink
spec:
  type: ClusterIP
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-metrics
      protocol: TCP
  selector:
    {{- include "pg2mongo-cdc.selectorLabels" (list . "sink") | nindent 4 }}
{{- if .Values.sink.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "pg2mongo-cdc.fullname" . }}-sink
  labels:
    {{- include "pg2mongo-cdc.labels" . | nindent 4 }}
    app.kubernetes.io/component: sink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "pg2mongo-cdc.fullname" . }}-sink
  minReplicas: {{ .Values.sink.hpa.minReplicas }}
  maxReplicas: {{ .Values.sink.hpa.maxReplicas }}
  metrics:
    {{- toYaml .Values.sink.hpa.metrics | nindent 4 }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
{{- end }}
{{- end }}
