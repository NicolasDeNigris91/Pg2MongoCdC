{{- if .Values.podMonitor.enabled -}}
{{/*
PodMonitor for prometheus-operator. One per workload - labels target the
matching component selector so a Prometheus instance can be scoped to scrape
just the pipeline.
*/}}
{{- range $component := list "transformer" "sink" }}
{{- $svcEnabled := index $.Values $component "enabled" }}
{{- if $svcEnabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "pg2mongo-cdc.fullname" $ }}-{{ $component }}
  labels:
    {{- include "pg2mongo-cdc.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  selector:
    matchLabels:
      {{- include "pg2mongo-cdc.selectorLabels" (list $ $component) | nindent 6 }}
  podMetricsEndpoints:
    - port: http-metrics
      path: /metrics
      interval: {{ $.Values.podMonitor.interval }}
      scrapeTimeout: {{ $.Values.podMonitor.scrapeTimeout }}
      {{- with $.Values.podMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end -}}
